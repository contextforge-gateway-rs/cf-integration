# Integration helpers for cf-controlplane + cf-dataplane.
#
# Combine with cf-controlplane docker-compose.yml and docker-compose.cf-dataplane.yaml.

services:
  cf-dataplane:
    depends_on:
      redis:
        condition: service_started
      register_fast_time:
        condition: service_completed_successfully

  fast_time_server:
    image: ${FAST_TIME_IMAGE:-ghcr.io/ibm/cfex-mcp-fast-time-server:latest}
    build: !reset null
    command: !reset null

  register_fast_time:
    volumes:
      - ${CF_INTEGRATION_ROOT:?Set CF_INTEGRATION_ROOT to the integration harness root}/scripts/register-fast-time.py:/opt/cf-integration/register-fast-time.py:ro
      - ${CF_INTEGRATION_ROOT:?Set CF_INTEGRATION_ROOT to the integration harness root}/scripts/cf-jwt.py:/opt/cf-integration/cf_jwt.py:ro
    entrypoint:
      - python3
      - /opt/cf-integration/register-fast-time.py
    command: !reset []

  # The Fast Time image used here serves /mcp only; skip the upstream SSE registration.
  register_fast_time_sse:
    entrypoint: ["echo", "cf-integration: skipping SSE registration (Fast Time image serves /mcp)"]
    command: !reset []

  cf-integration-mcp-counter:
    image: cf-integration-mcp-counter:local
    build:
      context: ${CF_INTEGRATION_ROOT:?Set CF_INTEGRATION_ROOT to the integration harness root}
      dockerfile: docker/mcp_counter.Dockerfile
    restart: unless-stopped
    networks: [mcpnet]
    expose:
      - "5555"
    ports:
      - "${CF_INTEGRATION_MCP_COUNTER_PORT:-5601}:5555"
    environment:
      RUST_LOG: ${CF_INTEGRATION_MCP_COUNTER_LOG:-info}
      MCP_SERVER_BIND_ADDRESS: 0.0.0.0:5555
      MCP_SERVER_ALLOWED_HOSTS: cf-integration-mcp-counter,cf-controlplane,cf-dataplane,nginx,localhost,127.0.0.1

  locust:
    volumes:
      # Harness locustfile with streamable-HTTP content negotiation; the
      # upstream locustfile_mcp_protocol.py sends Accept: application/json
      # and gets HTTP 406 from the dataplane route. Mounted in its own
      # directory because /mnt/locust is a read-only bind mount.
      - ${CF_INTEGRATION_ROOT:?Set CF_INTEGRATION_ROOT to the integration harness root}/scripts/locustfile_cf_dataplane.py:/mnt/locust-cf/locustfile_cf_dataplane.py:ro
      - ${CF_INTEGRATION_ROOT:?Set CF_INTEGRATION_ROOT to the integration harness root}/scripts/mcp_http.py:/mnt/locust-cf/mcp_http.py:ro
    environment:
      - MCPGATEWAY_BEARER_TOKEN=${MCPGATEWAY_BEARER_TOKEN:-}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-my-test-key-but-now-longer-than-32-bytes}
      - PLATFORM_ADMIN_EMAIL=${PLATFORM_ADMIN_EMAIL:-admin@example.com}
      - LOCUST_MODE=${LOCUST_MODE:-headless}
      - LOCUST_LOCUSTFILE=${LOCUST_LOCUSTFILE:-locustfile_cf_dataplane.py}
      - LOCUST_USERS=${LOCUST_USERS:-100}
      - LOCUST_SPAWN_RATE=${LOCUST_SPAWN_RATE:-10}
      - LOCUST_RUN_TIME=${LOCUST_RUN_TIME:-5m}
      - MCP_SERVER_ID=${MCP_SERVER_ID:-}
      - MCP_SERVER_IDS=${MCP_SERVER_IDS:-}
      - MCP_TOOL_NAMES=${MCP_TOOL_NAMES:-}
      - LOCUST_LOG_LEVEL=${LOCUST_LOG_LEVEL:-INFO}
    command:
      - |
        set -eu
        if [ -z "$${MCPGATEWAY_BEARER_TOKEN:-}" ]; then
          echo "MCPGATEWAY_BEARER_TOKEN is required" >&2
          exit 2
        fi

        # Defaults come from the environment section above.
        if [ -f "/mnt/locust-cf/$$LOCUST_LOCUSTFILE" ]; then
          LOCUSTFILE="/mnt/locust-cf/$$LOCUST_LOCUSTFILE"
        else
          LOCUSTFILE="/mnt/locust/$$LOCUST_LOCUSTFILE"
        fi

        if [ "$$LOCUST_MODE" = "headless" ]; then
          exec locust -f "$$LOCUSTFILE" \
            --host=http://nginx:80 \
            --users="$$LOCUST_USERS" \
            --spawn-rate="$$LOCUST_SPAWN_RATE" \
            --run-time="$$LOCUST_RUN_TIME" \
            --headless \
            --html=/mnt/reports/locust_report.html \
            --csv=/mnt/reports/locust \
            --only-summary
        fi

        exec locust -f "$$LOCUSTFILE" \
          --host=http://nginx:80 \
          --web-host=0.0.0.0 --web-port=8089 \
          --master --expect-workers="$${LOCUST_EXPECT_WORKERS:-1}" \
          --class-picker
