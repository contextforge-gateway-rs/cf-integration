# Integration overlay for cf-controlplane + cf-dataplane.
#
# Usage from this repo:
#   export CF_INTEGRATION_ROOT="$PWD"
#   export CF_DATAPLANE_IMAGE="ghcr.io/contextforge-gateway-rs/contextforge-gateway-rs:0.1.0"
#   export CF_DATAPLANE_PLATFORM="linux/amd64"
#   # Or let `cf-integration stack up --topology dataplane` resolve `auto`.
#   docker compose \
#     -f /path/to/cf-controlplane/docker-compose.yml \
#     -f "$CF_INTEGRATION_ROOT/docker/docker-compose.cf-dataplane.yaml" \
#     up

services:
  # cf-controlplane's upstream compose service key is gateway; expose it as
  # cf-controlplane on mcpnet. DATAPLANE_PUBLISHER is the only behavioral
  # change to the upstream gateway: it publishes virtual server configs to
  # Redis for cf-dataplane.
  gateway:
    networks:
      mcpnet:
        aliases:
          - cf-controlplane
    environment:
      DATAPLANE_PUBLISHER: "true"
      # Fresh databases bootstrap the admin with password_change_required,
      # which 303-redirects every /admin/* route to an HTML page and breaks
      # admin-API-driven test fixtures (e.g. the runtime-mode suite). The
      # control-plane-only commands already disable enforcement; match them.
      PASSWORD_CHANGE_ENFORCEMENT_ENABLED: ${PASSWORD_CHANGE_ENFORCEMENT_ENABLED:-false}
      ADMIN_REQUIRE_PASSWORD_CHANGE_ON_BOOTSTRAP: ${ADMIN_REQUIRE_PASSWORD_CHANGE_ON_BOOTSTRAP:-false}
      REQUIRE_PASSWORD_CHANGE_FOR_DEFAULT_PASSWORD: ${REQUIRE_PASSWORD_CHANGE_FOR_DEFAULT_PASSWORD:-false}
      # Short snapshot interval so runtime-created users/servers reach the
      # dataplane quickly in functional runs; raise for load benchmarks.
      # Requires a control-plane image with configurable publisher interval;
      # older images ignore the variable (60s behavior).
      DATAPLANE_PUBLISHER_INTERVAL_SECONDS: ${CF_DATAPLANE_PUBLISHER_INTERVAL_SECONDS:-2}

  dataplane:
    image: ${CF_DATAPLANE_IMAGE:?Set CF_DATAPLANE_IMAGE to the cf-dataplane image tag}
    platform: ${CF_DATAPLANE_PLATFORM:?Set CF_DATAPLANE_PLATFORM to the cf-dataplane image platform}
    labels:
      name: cf-dataplane
    restart: unless-stopped
    networks:
      mcpnet:
        aliases:
          - cf-dataplane
    expose:
      - "4445"
    environment:
      CONTEXTFORGE_GATEWAY_RS_ADDRESS: 0.0.0.0:4445
      CONTEXTFORGE_GATEWAY_RS_REDIS_HOSTNAME: redis
      CONTEXTFORGE_GATEWAY_RS_REDIS_PORT: "6379"
      CONTEXTFORGE_GATEWAY_RS_REDIS_CONNECTION_MODE: plain-text
      CONTEXTFORGE_GATEWAY_RS_TOKEN_SECRET: ${JWT_SECRET_KEY:-my-test-key-but-now-longer-than-32-bytes}
      CONTEXTFORGE_GATEWAY_RS_UPSTREAM_CONNECTION_MODE: plain-text-or-tls
      # Disable the per-subject config cache for functional runs: its sliding
      # TTL freezes stale configs under steady traffic (retry loops renew it
      # forever), hiding servers created after first contact. Set to 60 to
      # restore the image default for load benchmarks.
      CONTEXTFORGE_GATEWAY_RS_USER_CONFIG_CACHE_EXPIRY_SECONDS: ${CF_DATAPLANE_USER_CONFIG_CACHE_EXPIRY_SECONDS:-0}
      RUST_LOG: ${CF_DATAPLANE_LOG:-info}
    depends_on:
      redis:
        condition: service_started
    deploy:
      replicas: 1

  # SSE registration runs stock: the dataplane will not implement SSE
  # upstreams (deprecated; removed in the 2026-07-28 MCP protocol update),
  # but the publisher exports streamable-HTTP backends only, so SSE-backed
  # virtual servers are absent from dataplane config and nginx replays their
  # /servers/{id}/mcp requests on the control plane, which serves them fully.

  nginx:
    volumes:
      - ${CF_INTEGRATION_ROOT:?Set CF_INTEGRATION_ROOT to the integration harness root}/docker/nginx.cf-dataplane.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      gateway:
        condition: service_healthy
      dataplane:
        condition: service_started
